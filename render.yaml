services:
  - type: web
    name: next-mobile-cloud
    env: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: NEXT_MOBILE_SYNC_KEY
        generateValue: true
      - key: ALLOW_PUBLIC_MASTER
        value: "1"
